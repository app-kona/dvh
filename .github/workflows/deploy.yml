name: Deploy to Xserver via SSH Key

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          # image_FireShot Capture 019 で確認した情報
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          # ⚠️ さっき登録した秘密鍵を使います
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          # ⚠️ エックスサーバー指定のポート番号
          port: 10022 
          
          local_path: './*'
          # ⚠️ ファイルマネージャーで確認した正確なパス
          remote_path: '/home/xs057242/kona-resort.jp/public_html/lp_data/holoholo202601/'
          
          args: '-o StrictHostKeyChecking=no'
