name: Deploy to Xserver via SSH Key

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          # image_FireShot Capture 019 の情報
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          # ⚠️ パスワードではなく登録した秘密鍵を指定
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          # ⚠️ image_045483.png で確認したポート
          port: 10022 
          
          local_path: './*'
          # ⚠️ image_04d424.png で確認したパス
          remote_path: '/home/xs057242/kona-resort.jp/public_html/lp_data/holoholo202601/'
          
          args: '-o StrictHostKeyChecking=no'
