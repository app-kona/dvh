name: Deploy to Xserver via SFTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # ⚠️ 重要：エックスサーバー指定の 10022 番ポート
          port: 10022 
          
          local_path: './*'
          # ⚠️ ファイルマネージャーで確認した正確なフルパス
          remote_path: '/home/xs057242/kona-resort.jp/public_html/lp_data/holoholo202601/'
          
          # 初回接続時の認証エラーを回避する設定
          args: '-o StrictHostKeyChecking=no'
